name: Submit Dataproc Job

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'Google Cloud Project ID'
        required: true
        type: string
        default: 'gdelt-stock-sentiment-analysis'
      region:
        description: 'Compute region of the cluster'
        required: true
        type: string
        default: 'us-west1'
      cluster_name:
        description: 'Name of the Dataproc cluster'
        required: true
        type: string
      job_file_path:
        description: 'GCS URI of the PySpark job file (e.g., gs://bucket/script.py)'
        required: true
        type: string
      job_args:
        description: 'Optional arguments to pass to the PySpark job (space separated)'
        required: false
        type: string

jobs:
  submit-job:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-cloud-dataproc

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Submit PySpark Job
        run: |
          if [ -n "${{ github.event.inputs.job_args }}" ]; then
            python scripts/cicd/submit_dataproc_job.py \
              --project_id "${{ github.event.inputs.project_id }}" \
              --region "${{ github.event.inputs.region }}" \
              --cluster_name "${{ github.event.inputs.cluster_name }}" \
              --job_file_path "${{ github.event.inputs.job_file_path }}" \
              ${{ github.event.inputs.job_args }}
          else
            python scripts/cicd/submit_dataproc_job.py \
              --project_id "${{ github.event.inputs.project_id }}" \
              --region "${{ github.event.inputs.region }}" \
              --cluster_name "${{ github.event.inputs.cluster_name }}" \
              --job_file_path "${{ github.event.inputs.job_file_path }}"
          fi